patterns:
- |-
  free({{PROP}})
  ..}
  free({{PROP}} ..$)
name: p1
group:
  name: double_free
  match:
  - _START
  - _A
  - _AN
  - _B
  - _BN
templates:
  PROP:
    - ..^ $_A
    - ..^ $_A->$_B
    - ..^ $_A.$_B
    - ..^ $_A[$_AN]
    - ..^ $_A[$_AN]->$_B
    - ..^ $_A[$_AN].$_B
    - ..^ $_A[$_AN]->$_B[$_BN]
    - ..^ $_A[$_AN].$_B[$_BN]
    - ..^ $_START ... $_A->$_B
    - ..^ $_START ... $_A.$_B
    - ..^ $_START ... $_A[$_AN]
    - ..^ $_START ... $_A[$_AN]->$_B
    - ..^ $_START ... $_A[$_AN].$_B
    - ..^ $_START ... $_A[$_AN]->$_B[$_BN]
    - ..^ $_START ... $_A[$_AN].$_B[$_BN]
languages:
  - c