# warning: not tested / comprehensive
patterns:
- |-
  {{PROP}} = ..! $_ALLOC (...) ..! ;
  ..}
  free({{PROP}})
  ..}
  free(..^ {{PROP}} ..$)
name: p0
group:
  name: double_free
  match:
  - _A
  - _AN
  - _B
  - _BN
transform:
  _ALLOC: ^.*alloc.*$
templates:
  PROP:
    - ..^ $_A
    - ..^ $_A->$_B
    - ..^ $_A.$_B
    - ..^ $_A[$_AN]
    - ..^ $_A[$_AN]->$_B
    - ..^ $_A[$_AN].$_B
    - ..^ $_A[$_AN]->$_B[$_BN]
    - ..^ $_A[$_AN].$_B[$_BN]
    # LexerSearch doesn't currently have support for multi-token captures and
    # it's not clear at this time how that would be implemented safely. instead,
    # a similarity is good enough
    - ..^ $_START ... $_A->$_B
    - ..^ $_START ... $_A.$_B
    - ..^ $_START ... $_A[$_AN]
    - ..^ $_START ... $_A[$_AN]->$_B
    - ..^ $_START ... $_A[$_AN].$_B
    - ..^ $_START ... $_A[$_AN]->$_B[$_BN]
    - ..^ $_START ... $_A[$_AN].$_B[$_BN]
languages:
  - c