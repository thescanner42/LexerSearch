patterns:
- |-
  {{PROP}} = ..! $_ALLOC (...) ..! ;
  ..}
  free({{PROP}})
  ..}
  {{PROP}} = {{CANCEL}};
  ..}
  free({{PROP}})
name: n0
group:
  name: double_free
  cancel: true
transform:
  _ALLOC: ^.*alloc.*$
  _REALLOC: ^.*alloc.*$
templates:
  CANCEL:
    - 0
    - NULL
    - $_REALLOC(...)
  PROP:
    # set_start to follow path from positive and reduce graph size
    - ..^ $_A
    - ..^ $_A->$_B
    - ..^ $_A.$_B
    - ..^ $_A[$_AN]
    - ..^ $_A[$_AN]->$_B
    - ..^ $_A[$_AN].$_B
    - ..^ $_A[$_AN]->$_B[$_BN]
    - ..^ $_A[$_AN].$_B[$_BN]
    - ..^ $_START ... $_A->$_B
    - ..^ $_START ... $_A.$_B
    - ..^ $_START ... $_A[$_AN]
    - ..^ $_START ... $_A[$_AN]->$_B
    - ..^ $_START ... $_A[$_AN].$_B
    - ..^ $_START ... $_A[$_AN]->$_B[$_BN]
    - ..^ $_START ... $_A[$_AN].$_B[$_BN]
languages:
  - c