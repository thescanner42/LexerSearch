patterns:
- |-
  free({{PROP}})
  ..}
  {{PROP}} = ..!;
  ..}
  free({{PROP}})
- |-
  free({{PROP2}} ... $_C)
  ..}
  {{PROP2}} ..} $_C = ..!;
  ..}
  free({{PROP2}} ... $_C)
name: n0
group:
  name: double_free
  cancel: true
templates:
  PROP:
    - $_A
    - $_A->$_B
    - $_A.$_B
    - $_A[$_B]
  PROP2:
    # prevent ... from outside brackets
      - $_A.$_B
      - $_A->$_B
      - $_A[$_B]
languages:
  - c