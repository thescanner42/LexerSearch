patterns: # travel method from anchor
  - >
    String $_M = $_EXP;
    ..}
    TransportGenerator.create($_M ...)
  - >
    String $_M = $_EXP;
    ..}
    $_VAR = TransportGenerator.create($_M ...)
languages:
  - java
name: method
transform:
  _EXP: "^\"(?<METHOD>.*)\"$"
group:
  name: travel_group
  match:
    - _VAR
